version: '3.8'

services:
  postgres:
    image: postgres:18-alpine
    container_name: AssetForge
    environment:
      POSTGRES_DB: asset_forge
      POSTGRES_USER: alveskz
      POSTGRES_PASSWORD: akz
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - AssetForge-network

volumes:
  postgres_data:

networks:
  AssetForge-network:
    driver: bridge